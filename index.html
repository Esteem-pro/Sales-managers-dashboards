<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Дашборд (Vanilla JS)</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 font-sans p-6">

  <div class="max-w-7xl mx-auto">
    
    <div class="flex flex-col md:flex-row justify-between items-center mb-8 bg-white p-4 rounded-xl shadow-sm border border-gray-100">
      <h1 class="text-2xl font-bold text-gray-800">Дашборд Отдела Продаж (Vanilla JS)</h1>
      <div class="flex space-x-4 mt-4 md:mt-0">
        <select id="monthSelect" class="border p-2 rounded-lg bg-gray-50 outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer">
          <option value="Все">Все месяцы</option>
          <option value="Март">Март</option>
          <option value="Апрель">Апрель</option>
        </select>
        <select id="sellerSelect" class="border p-2 rounded-lg bg-gray-50 outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer">
          <option value="Все">Все менеджеры</option>
          <option value="Егор">Егор</option>
          <option value="Александр">Александр</option>
          <option value="Артем">Артем</option>
          <option value="Дарья">Дарья</option>
        </select>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
      <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-blue-500">
        <p class="text-sm text-gray-500 mb-1">Приведенная выручка</p>
        <h3 id="kpi-revenue" class="text-2xl font-bold text-gray-800">0 ₽</h3>
      </div>
      <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-green-500">
        <p class="text-sm text-gray-500 mb-1">Факт поступлений</p>
        <h3 id="kpi-receipts" class="text-2xl font-bold text-gray-800">0 ₽</h3>
      </div>
      <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-yellow-500">
        <p class="text-sm text-gray-500 mb-1">Количество продаж</p>
        <h3 id="kpi-sales" class="text-2xl font-bold text-gray-800">0</h3>
      </div>
      <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-purple-500">
        <p class="text-sm text-gray-500 mb-1">Новых лидов</p>
        <h3 id="kpi-leads" class="text-2xl font-bold text-gray-800">0</h3>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      
      <div class="bg-white p-6 rounded-xl shadow-sm lg:col-span-2">
        <h3 class="text-lg font-semibold text-gray-800 mb-4">Динамика выручки по дням</h3>
        <div class="relative h-72 w-full">
          <canvas id="barChart"></canvas>
        </div>
      </div>

      <div class="bg-white p-6 rounded-xl shadow-sm">
        <h3 class="text-lg font-semibold text-gray-800 mb-4">Доля выручки</h3>
        <div id="pie-container" class="relative h-72 w-full flex items-center justify-center">
          <canvas id="pieChart"></canvas>
          <p id="pie-message" class="hidden text-gray-400 text-center">Выбран один менеджер. <br>Доли скрыты.</p>
        </div>
      </div>

    </div>
  </div>

  <script>
    // 1. Генерируем случайные моковые данные
    const sellers = ['Егор', 'Александр', 'Артем', 'Дарья'];
    const months = { '03': 'Март', '04': 'Апрель' };
    const rawData = [];

    // Создаем 50 случайных записей
    for (let i = 1; i <= 50; i++) {
      const monthNum = Math.random() > 0.5 ? '03' : '04';
      const day = String(Math.floor(Math.random() * 28) + 1).padStart(2, '0');
      
      rawData.push({
        date: `2026-${monthNum}-${day}`,
        month: months[monthNum],
        seller: sellers[Math.floor(Math.random() * sellers.length)],
        revenue: Math.floor(Math.random() * 200000) + 50000,  // От 50к до 250к
        receipts: Math.floor(Math.random() * 150000) + 30000,
        sales: Math.floor(Math.random() * 5) + 1,
        leads: Math.floor(Math.random() * 20) + 5
      });
    }

    // Переменные для хранения "экземпляров" графиков Chart.js
    let myBarChart = null;
    let myPieChart = null;
    const chartColors = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444'];

    // 2. Главная функция обновления дашборда
    function updateDashboard() {
      // Считываем значения из выпадающих списков
      const selectedMonth = document.getElementById('monthSelect').value;
      const selectedSeller = document.getElementById('sellerSelect').value;

      // ФИЛЬТРАЦИЯ: оставляем только те строки, которые подходят под фильтры
      const filteredData = rawData.filter(item => {
        const matchMonth = selectedMonth === 'Все' || item.month === selectedMonth;
        const matchSeller = selectedSeller === 'Все' || item.seller === selectedSeller;
        return matchMonth && matchSeller;
      });

      // СЧИТАЕМ KPI
      let totalRevenue = 0, totalReceipts = 0, totalSales = 0, totalLeads = 0;
      filteredData.forEach(item => {
        totalRevenue += item.revenue;
        totalReceipts += item.receipts;
        totalSales += item.sales;
        totalLeads += item.leads;
      });

      // ОБНОВЛЯЕМ ЦИФРЫ НА ЭКРАНЕ (обращаемся к HTML элементам по ID)
      document.getElementById('kpi-revenue').innerText = totalRevenue.toLocaleString('ru-RU') + ' ₽';
      document.getElementById('kpi-receipts').innerText = totalReceipts.toLocaleString('ru-RU') + ' ₽';
      document.getElementById('kpi-sales').innerText = totalSales;
      document.getElementById('kpi-leads').innerText = totalLeads;

      // СТРОИМ ГРАФИКИ
      drawBarChart(filteredData);
      drawPieChart(filteredData, selectedSeller);
    }

    // 3. Функция отрисовки столбчатого графика (Динамика по дням)
    function drawBarChart(data) {
      // Группируем выручку по датам
      const groupedByDate = {};
      data.forEach(item => {
        if (!groupedByDate[item.date]) groupedByDate[item.date] = 0;
        groupedByDate[item.date] += item.revenue;
      });

      // Сортируем даты по порядку
      const sortedDates = Object.keys(groupedByDate).sort();
      const revenueValues = sortedDates.map(date => groupedByDate[date]);

      // Удаляем старый график, если он был, чтобы нарисовать новый
      if (myBarChart) myBarChart.destroy();

      const ctx = document.getElementById('barChart').getContext('2d');
      myBarChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: sortedDates,
          datasets: [{
            label: 'Выручка (₽)',
            data: revenueValues,
            backgroundColor: '#3b82f6',
            borderRadius: 4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
        }
      });
    }

    // 4. Функция отрисовки кругового графика (Доли менеджеров)
    function drawPieChart(data, selectedSeller) {
      const canvas = document.getElementById('pieChart');
      const message = document.getElementById('pie-message');

      // Если выбран конкретный менеджер, прячем график, показываем текст
      if (selectedSeller !== 'Все') {
        canvas.style.display = 'none';
        message.classList.remove('hidden');
        return;
      } else {
        canvas.style.display = 'block';
        message.classList.add('hidden');
      }

      // Группируем выручку по менеджерам
      const groupedBySeller = {};
      data.forEach(item => {
        if (!groupedBySeller[item.seller]) groupedBySeller[item.seller] = 0;
        groupedBySeller[item.seller] += item.revenue;
      });

      const labels = Object.keys(groupedBySeller);
      const values = Object.values(groupedBySeller);

      // Удаляем старый график
      if (myPieChart) myPieChart.destroy();

      const ctx = canvas.getContext('2d');
      myPieChart = new Chart(ctx, {
        type: 'doughnut', // 'pie' для сплошного круга, 'doughnut' для бублика
        data: {
          labels: labels,
          datasets: [{
            data: values,
            backgroundColor: chartColors,
            borderWidth: 0
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
        }
      });
    }

    // 5. НАВЕШИВАЕМ СОБЫТИЯ НА ФИЛЬТРЫ
    // Когда пользователь меняет селект, вызываем updateDashboard()
    document.getElementById('monthSelect').addEventListener('change', updateDashboard);
    document.getElementById('sellerSelect').addEventListener('change', updateDashboard);

    // 6. ПЕРВЫЙ ЗАПУСК при загрузке страницы
    updateDashboard();

  </script>
</body>
</html>
