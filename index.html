<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .bento-card { @apply bg-white p-5 rounded-3xl shadow-sm border border-gray-100 flex flex-col justify-between; }
        .indicator-value { @apply text-2xl font-bold text-slate-800; }
        .comparison-tag { @apply text-xs font-medium px-2 py-1 rounded-full mt-2; }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-8">
    
    <div id="login" class="fixed inset-0 bg-slate-900 z-50 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl max-w-sm w-full">
            <h2 class="text-2xl font-bold mb-4">Вход в систему</h2>
            <input type="text" id="username" placeholder="Имя менеджера" class="w-full mb-3 p-3 border rounded-xl">
            <button onclick="login()" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold">Войти</button>
        </div>
    </div>

    <main class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Мои показатели</h1>
            <div class="bg-white p-1 rounded-xl shadow-sm flex text-sm font-medium">
                <button class="px-4 py-2 bg-slate-900 text-white rounded-lg">Текущий месяц</button>
                <button class="px-4 py-2 text-slate-500">За все время</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            
            <div class="bento-card md:col-span-1">
                <span class="text-slate-500 text-sm">План продаж</span>
                <input type="number" id="salesPlan" class="indicator-value bg-transparent focus:outline-none" value="1000000">
            </div>

            <div class="bento-card md:col-span-1">
                <span class="text-slate-500 text-sm">% Выполнения</span>
                <div class="indicator-value" id="planPercent">75%</div>
                <div class="comparison-tag bg-green-100 text-green-700">+5% к отделу</div>
            </div>

            <div class="bento-card md:col-span-2">
                <span class="text-slate-500 text-sm">Суммарная выручка (Нов + Повт)</span>
                <div class="indicator-value" id="totalRevenue">750,000 ₽</div>
            </div>

            <div class="bento-card">
                <span class="text-slate-500 text-sm">Прогноз на месяц</span>
                <div class="indicator-value text-blue-600" id="forecast">92%</div>
            </div>

            <div class="bento-card">
                <span class="text-slate-500 text-sm">Конверсия (Лид/Продажа)</span>
                <div class="indicator-value" id="conversion">12.4%</div>
                <div class="comparison-tag bg-red-100 text-red-700">-2% к отделу</div>
            </div>

            <div class="bento-card md:col-span-2">
                <div class="flex justify-between">
                    <div>
                        <span class="text-slate-500 text-sm block">Дебиторка (Получено)</span>
                        <span class="text-xl font-bold" id="debReceived">150k ₽</span>
                    </div>
                    <div class="text-right border-l pl-4">
                        <span class="text-slate-500 text-sm block">Новая дебиторка</span>
                        <span class="text-xl font-bold text-orange-500" id="debNew">45k ₽</span>
                    </div>
                </div>
            </div>

            <div class="bento-card md:col-span-4 h-64">
                <canvas id="leadsChart"></canvas>
            </div>

        </div>
    </main>

    <script>
        // Здесь будет JS логика запроса к Apps Script и отрисовка Chart.js
    </script>
</body>
</html>
