<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Дашборд ОП (Vanilla JS)</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 font-sans p-4 md:p-6 min-h-screen">

  <div class="max-w-7xl mx-auto">
    
    <div class="flex flex-col md:flex-row justify-between items-center mb-6 bg-white p-5 rounded-xl shadow-sm border border-gray-200">
      <h1 class="text-2xl font-bold text-gray-800 mb-4 md:mb-0">Управление Продажами</h1>
      
      <div class="flex flex-wrap items-center gap-4">
        <div class="flex items-center border rounded-lg bg-gray-50 overflow-hidden focus-within:ring-2 focus-within:ring-blue-500">
          <span class="px-3 text-gray-500 text-sm font-medium">План (₽):</span>
          <input type="number" id="planInput" value="3000000" class="p-2 w-32 bg-transparent outline-none font-bold text-gray-800" placeholder="0">
        </div>

        <select id="monthSelect" class="border p-2 rounded-lg bg-white outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer font-medium text-gray-700">
          <option value="Март">Март (31 день)</option>
          <option value="Апрель">Апрель (30 дней)</option>
          <option value="Все">Все месяцы</option>
        </select>
        
        <select id="sellerSelect" class="border p-2 rounded-lg bg-white outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer font-medium text-gray-700">
          <option value="Все">Все менеджеры</option>
          <option value="Егор">Егор</option>
          <option value="Александр">Александр</option>
          <option value="Артем">Артем</option>
          <option value="Дарья">Дарья</option>
        </select>
      </div>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-6">
      
      <div class="bg-white p-4 rounded-xl shadow-sm border-b-4 border-blue-500">
        <p class="text-xs text-gray-500 mb-1 font-semibold uppercase">Выручка (Факт)</p>
        <h3 id="kpi-revenue" class="text-xl md:text-2xl font-bold text-gray-800">0 ₽</h3>
      </div>

      <div class="bg-white p-4 rounded-xl shadow-sm border-b-4 border-indigo-500 relative overflow-hidden">
        <p class="text-xs text-gray-500 mb-1 font-semibold uppercase">% Выполнения</p>
        <h3 id="kpi-completion" class="text-xl md:text-2xl font-bold text-gray-800">0%</h3>
        <div class="absolute bottom-0 left-0 h-1 bg-indigo-100 w-full">
          <div id="progress-bar" class="h-full bg-indigo-500 transition-all duration-500" style="width: 0%;"></div>
        </div>
      </div>

      <div class="bg-white p-4 rounded-xl shadow-sm border-b-4 border-purple-500">
        <p class="text-xs text-gray-500 mb-1 font-semibold uppercase">Прогноз (мес)</p>
        <h3 id="kpi-forecast" class="text-xl md:text-2xl font-bold text-gray-800">0 ₽</h3>
      </div>

      <div class="bg-white p-4 rounded-xl shadow-sm border-b-4 border-emerald-500">
        <p class="text-xs text-gray-500 mb-1 font-semibold uppercase">Конверсия</p>
        <h3 id="kpi-conversion" class="text-xl md:text-2xl font-bold text-gray-800">0%</h3>
      </div>

      <div class="bg-white p-4 rounded-xl shadow-sm border-b-4 border-orange-500">
        <p class="text-xs text-gray-500 mb-1 font-semibold uppercase">Взято Лидов</p>
        <h3 id="kpi-leads" class="text-xl md:text-2xl font-bold text-gray-800">0</h3>
      </div>

      <div class="bg-white p-4 rounded-xl shadow-sm border-b-4 border-green-400">
        <p class="text-xs text-gray-500 mb-1 font-semibold uppercase">Продаж (шт)</p>
        <h3 id="kpi-sales" class="text-xl md:text-2xl font-bold text-gray-800">0</h3>
      </div>

    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      
      <div class="bg-white p-5 rounded-xl shadow-sm lg:col-span-2">
        <h3 class="text-sm font-bold text-gray-600 uppercase mb-4">Выручка по дням</h3>
        <div class="relative h-64 w-full">
          <canvas id="revenueChart"></canvas>
        </div>
      </div>

      <div class="bg-white p-5 rounded-xl shadow-sm">
        <h3 class="text-sm font-bold text-gray-600 uppercase mb-4">Доля в выручке</h3>
        <div id="pie-container" class="relative h-64 w-full flex items-center justify-center">
          <canvas id="pieChart"></canvas>
          <p id="pie-message" class="hidden text-gray-400 text-center text-sm">Выбран один менеджер. <br>Доли скрыты.</p>
        </div>
      </div>

      <div class="bg-white p-5 rounded-xl shadow-sm lg:col-span-3">
        <h3 class="text-sm font-bold text-gray-600 uppercase mb-4">Динамика взятых лидов</h3>
        <div class="relative h-64 w-full">
          <canvas id="leadsChart"></canvas>
        </div>
      </div>

    </div>
  </div>

  <script>
    const sellers = ['Егор', 'Александр', 'Артем', 'Дарья'];
    const months = { '03': 'Март', '04': 'Апрель' };
    const rawData = [];

    // Генерируем данные только до 20-го числа, чтобы симулировать "текущий день" и показать работу прогноза
    for (let i = 1; i <= 60; i++) {
      const monthNum = Math.random() > 0.5 ? '03' : '04';
      const day = String(Math.floor(Math.random() * 20) + 1).padStart(2, '0'); // Дни от 1 до 20
      
      rawData.push({
        date: `2026-${monthNum}-${day}`,
        month: months[monthNum],
        seller: sellers[Math.floor(Math.random() * sellers.length)],
        revenue: Math.floor(Math.random() * 150000) + 20000, 
        sales: Math.floor(Math.random() * 3), 
        leads: Math.floor(Math.random() * 15) + 2 
      });
    }

    let myRevenueChart = null;
    let myPieChart = null;
    let myLeadsChart = null;

    // Главная функция пересчета дашборда
    function updateDashboard() {
      const selectedMonth = document.getElementById('monthSelect').value;
      const selectedSeller = document.getElementById('sellerSelect').value;
      const planValue = Number(document.getElementById('planInput').value) || 0;

      // 1. Фильтрация
      const filteredData = rawData.filter(item => {
        const matchMonth = selectedMonth === 'Все' || item.month === selectedMonth;
        const matchSeller = selectedSeller === 'Все' || item.seller === selectedSeller;
        return matchMonth && matchSeller;
      });

      // 2. Агрегация данных
      let totalRevenue = 0, totalSales = 0, totalLeads = 0;
      const uniqueDaysSet = new Set(); // Считаем, сколько дней мы реально отработали

      filteredData.forEach(item => {
        totalRevenue += item.revenue;
        totalSales += item.sales;
        totalLeads += item.leads;
        uniqueDaysSet.add(item.date);
      });

      const workedDays = uniqueDaysSet.size || 1; // Защита от деления на 0

      // 3. Вычисление сложных метрик
      
      // Конверсия (Продажи / Лиды)
      const conversion = totalLeads > 0 ? ((totalSales / totalLeads) * 100).toFixed(1) : 0;
      
      // Процент выполнения плана
      const completion = planValue > 0 ? ((totalRevenue / planValue) * 100).toFixed(1) : 0;

      // Прогноз линейный (Ср. выручка в день * Кол-во дней в месяце)
      let daysInMonthTarget = 30; // По умолчанию
      if (selectedMonth === 'Март') daysInMonthTarget = 31;
      if (selectedMonth === 'Апрель') daysInMonthTarget = 30;
      if (selectedMonth === 'Все') daysInMonthTarget = 61; // Март + Апрель

      // Прогноз: (Сумма / Отработанные дни) * Всего дней в периоде
      const forecast = Math.round((totalRevenue / workedDays) * daysInMonthTarget);

      // 4. Обновление HTML (Рендер метрик)
      document.getElementById('kpi-revenue').innerText = totalRevenue.toLocaleString('ru-RU') + ' ₽';
      document.getElementById('kpi-sales').innerText = totalSales;
      document.getElementById('kpi-leads').innerText = totalLeads;
      document.getElementById('kpi-conversion').innerText = conversion + '%';
      document.getElementById('kpi-forecast').innerText = forecast.toLocaleString('ru-RU') + ' ₽';
      document.getElementById('kpi-completion').innerText = completion + '%';

      // Анимация полоски прогресса плана
      const progressBar = document.getElementById('progress-bar');
      progressBar.style.width = Math.min(completion, 100) + '%';
      progressBar.className = `h-full transition-all duration-500 ${completion >= 100 ? 'bg-green-500' : 'bg-indigo-500'}`;

      // 5. Отрисовка графиков
      drawRevenueChart(filteredData);
      drawPieChart(filteredData, selectedSeller);
      drawLeadsChart(filteredData);
    }

    // --- Функции графиков Chart.js ---

    function drawRevenueChart(data) {
      const grouped = {};
      data.forEach(item => {
        if (!grouped[item.date]) grouped[item.date] = 0;
        grouped[item.date] += item.revenue;
      });

      const dates = Object.keys(grouped).sort();
      const values = dates.map(d => grouped[d]);

      if (myRevenueChart) myRevenueChart.destroy();
      const ctx = document.getElementById('revenueChart').getContext('2d');
      myRevenueChart = new Chart(ctx, {
        type: 'bar',
        data: { labels: dates, datasets: [{ label: 'Выручка (₽)', data: values, backgroundColor: '#3b82f6', borderRadius: 4 }] },
        options: { responsive: true, maintainAspectRatio: false }
      });
    }

    function drawLeadsChart(data) {
      const grouped = {};
      data.forEach(item => {
        if (!grouped[item.date]) grouped[item.date] = 0;
        grouped[item.date] += item.leads;
      });

      const dates = Object.keys(grouped).sort();
      const values = dates.map(d => grouped[d]);

      if (myLeadsChart) myLeadsChart.destroy();
      const ctx = document.getElementById('leadsChart').getContext('2d');
      myLeadsChart = new Chart(ctx, {
        type: 'line', // Делаем линией для отличия
        data: { 
          labels: dates, 
          datasets: [{ 
            label: 'Взято лидов (шт)', 
            data: values, 
            borderColor: '#f59e0b', // Оранжевый цвет
            backgroundColor: 'rgba(245, 158, 11, 0.2)',
            borderWidth: 2,
            pointBackgroundColor: '#f59e0b',
            fill: true,
            tension: 0.3 // Немного скругляем линию
          }] 
        },
        options: { responsive: true, maintainAspectRatio: false }
      });
    }

    function drawPieChart(data, selectedSeller) {
      const canvas = document.getElementById('pieChart');
      const message = document.getElementById('pie-message');

      if (selectedSeller !== 'Все') {
        canvas.style.display = 'none'; message.classList.remove('hidden'); return;
      } else {
        canvas.style.display = 'block'; message.classList.add('hidden');
      }

      const grouped = {};
      data.forEach(item => {
        if (!grouped[item.seller]) grouped[item.seller] = 0;
        grouped[item.seller] += item.revenue;
      });

      if (myPieChart) myPieChart.destroy();
      const ctx = canvas.getContext('2d');
      myPieChart = new Chart(ctx, {
        type: 'doughnut',
        data: { 
          labels: Object.keys(grouped), 
          datasets: [{ data: Object.values(grouped), backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444'], borderWidth: 0 }] 
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
      });
    }

    // Слушатели событий: обновляем всё, когда пользователь меняет фильтры или вводит цифры
    document.getElementById('monthSelect').addEventListener('change', updateDashboard);
    document.getElementById('sellerSelect').addEventListener('change', updateDashboard);
    
    // Событие 'input' срабатывает мгновенно при вводе каждой цифры в поле плана
    document.getElementById('planInput').addEventListener('input', updateDashboard);

    // Запуск при старте
    updateDashboard();

  </script>
</body>
</html>
