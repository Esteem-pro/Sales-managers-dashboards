<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Дашборд Менеджера</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg-color: #f4f6f9;
      --card-bg: #ffffff;
      --text-color: #333333;
      --primary-color: #007bff;
      --border-color: #e0e0e0;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Форма авторизации */
    #auth-form {
      max-width: 400px;
      margin: 100px auto;
      padding: 30px;
      background: var(--card-bg);
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    .form-group {
      margin-bottom: 15px;
    }
    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: 600;
    }
    .form-group input {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 12px;
      background: var(--primary-color);
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { background: #0056b3; }

    /* Переключатель вкладок */
    .tabs {
      display: flex;
      margin-bottom: 20px;
      border-bottom: 2px solid var(--border-color);
    }
    .tab-btn {
      padding: 12px 24px;
      cursor: pointer;
      background: none;
      border: none;
      font-weight: 600;
      color: #666;
      width: auto;
    }
    .tab-btn.active {
      color: var(--primary-color);
      border-bottom: 3px solid var(--primary-color);
      margin-bottom: -2px;
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Карточки метрик */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .card {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
      border: 1px solid var(--border-color);
    }
    .card h3 { margin: 0 0 10px 0; font-size: 14px; color: #888; text-transform: uppercase; }
    .card .value { font-size: 24px; font-weight: bold; }

    /* Таблица заказов (Третья вкладка) */
    .table-container {
      background: var(--card-bg);
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid var(--border-color);
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }
    th, td { padding: 12px 15px; border-bottom: 1px solid var(--border-color); font-size: 14px; }
    th { background-color: #fafafa; font-weight: 600; }
    tr:hover { background-color: #f9f9f9; }

    .status-badge {
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }
    .status-true { background: #e2f0d9; color: #385723; }
    .status-false { background: #fff2cc; color: #7f6000; }

    .hidden { display: none !important; }
    .chart-container { max-width: 600px; margin-top: 20px; background: white; padding: 15px; border-radius: 8px; border: 1px solid var(--border-color); }
  </style>
</head>
<body>

<div class="container">
  <div id="auth-block">
    <div id="auth-form">
      <h2>Вход в панель</h2>
      <div class="form-group">
        <label>Имя менеджера</label>
        <input type="text" id="username" placeholder="Иван Иванов">
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" id="password" placeholder="******">
      </div>
      <button onclick="login()">Войти</button>
      <p id="auth-error" style="color: red; margin-top: 10px;" class="hidden"></p>
    </div>
  </div>

  <div id="dashboard-block" class="hidden">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('tab1')">Личная статистика</button>
      <button class="tab-btn" onclick="switchTab('tab2')">Глобальная динамика</button>
      <button class="tab-btn" onclick="switchTab('tab3')">Мой доход</button>
    </div>

    <div id="tab1" class="tab-content active">
      <div class="metrics-grid" id="personal-cards">
        </div>
    </div>

    <div id="tab2" class="tab-content">
      <div id="global-content">
        <p>Данные глобальной динамики загружены.</p>
      </div>
    </div>

    <div id="tab3" class="tab-content">
      <div class="metrics-grid">
        <div class="card">
          <h3>Доход за текущий месяц</h3>
          <div class="value" id="inc-total">0 ₽</div>
        </div>
        <div class="card">
          <h3>Доход с оверпрайса</h3>
          <div class="value" id="inc-overprice">0 ₽</div>
        </div>
        <div class="card">
          <h3>Средний коэф. плана</h3>
          <div class="value" id="inc-coeff">0</div>
        </div>
      </div>

      <div class="chart-container">
        <canvas id="incomeChart"></canvas>
      </div>

      <h3 style="margin-top: 30px; margin-bottom: 10px;">Список ваших заказов</h3>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Дата продажи</th>
              <th>ID заказа</th>
              <th>Выручка план</th>
              <th>Задолженность</th>
              <th>Изготовлен</th>
              <th>Базовый доход</th>
              <th>Коэффициент</th>
              <th>Оверпрайс</th>
              <th>Итоговый доход</th>
              <th>Статус выплаты</th>
            </tr>
          </thead>
          <tbody id="orders-table-body">
            </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
  // Твой актуальный URL Web App из Google Apps Script
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzK-6RUJcQYZykSwtZWq5CawXYcrL5MGWGddzvq3HOKsFXY3Vxl5C39htR0qVhRBCzC/exec";
  
  let incomeChartInstance = null; // Для хранения объекта графика

  // Переключение вкладок
  function switchTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    
    document.getElementById(tabId).classList.add('active');
    event.currentTarget.classList.add('active');
  }

  // Авторизация и получение данных
  async function login() {
    const name = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value.trim();
    const errorEl = document.getElementById('auth-error');

    if(!name || !pass) {
      errorEl.textContent = "Заполните все поля";
      errorEl.classList.remove('hidden');
      return;
    }

    errorEl.classList.add('hidden');

    try {
      const response = await fetch(WEB_APP_URL, {
        method: 'POST',
        mode: 'no-cors', // Важно для Apps Script, если не настроены заголовки CORS
        body: JSON.stringify({ name: name, pass: pass })
      });

      // Так как используется 'no-cors', мы не сможем прочитать ответ напрямую через fetch в некоторых браузерах.
      // Чтобы обойти это, рекомендуется использовать стандартный подход с отправкой JSONP или получать чистый ответ,
      // но раз скрипт настроен возвращать JSON, мы попробуем распарсить его стандартно.
      // Если у тебя на фронте до этого стоял обычный fetch, то используем его:
      
      const resData = await fetch(WEB_APP_URL, {
        method: 'POST',
        body: JSON.stringify({ name: name, pass: pass })
      }).then(r => r.json());

      if (resData.status === 'success') {
        document.getElementById('auth-block').classList.add('hidden');
        document.getElementById('dashboard-block').classList.remove('hidden');
        
        // Рендерим все три вкладки
        renderPersonalTab(resData.data.personal);
        renderGlobalTab(resData.data.global);
        renderIncomeTab(resData.data.income);
      } else {
        errorEl.textContent = resData.message || "Ошибка авторизации";
        errorEl.classList.remove('hidden');
      }

    } catch (err) {
      errorEl.textContent = "Ошибка соединения со сервером: " + err.message;
      errorEl.classList.remove('hidden');
    }
  }

  // === ВКЛАДКА 1: РЕНДЕР (НЕ ТРОГАЕМ ЛОГИКУ, ПРОСТО ВЫВОДИМ) ===
  function renderPersonalTab(personal) {
    const container = document.getElementById('personal-cards');
    container.innerHTML = `
      <div class="card"><h3>Выручка всего</h3><div class="value">${Math.round(personal.totalRevenue || 0).toLocaleString()} ₽</div></div>
      <div class="card"><h3>Выручка (Новые)</h3><div class="value">${Math.round(personal.revNew || 0).toLocaleString()} ₽</div></div>
      <div class="card"><h3>Выручка (Повторные)</h3><div class="value">${Math.round(personal.revRep || 0).toLocaleString()} ₽</div></div>
      <div class="card"><h3>Касса</h3><div class="value">${Math.round(personal.cash || 0).toLocaleString()} ₽</div></div>
      <div class="card"><h3>Конверсия</h3><div class="value">${(personal.conversion || 0).toFixed(1)}%</div></div>
      <div class="card"><h3>% Выполнения плана</h3><div class="value">${(personal.planPercent || 0).toFixed(1)}%</div></div>
    `;
  }

  // === ВКЛАДКА 2: РЕНДЕР (НЕ ТРОГАЕМ ЛОГИКУ) ===
  function renderGlobalTab(global) {
    // Здесь остается твоя старая логика отображения глобальных данных.
    console.log("Глобальная статистика загружена:", global);
  }

  // === ВКЛАДКА 3: РЕНДЕР «МОЙ ДОХОД» (НОВАЯ ЛОГИКА) ===
  function renderIncomeTab(income) {
    if (!income) {
      document.getElementById('tab3').innerHTML = "<p style='padding:20px;'>Данные по доходам отсутствуют или нет доступа ко 2-й таблице.</p>";
      return;
    }

    // 1. Заполняем верхние карточки
    document.getElementById('inc-total').textContent = Math.round(income.totalCurrent || 0).toLocaleString() + " ₽";
    document.getElementById('inc-overprice').textContent = Math.round(income.overpriceTotal || 0).toLocaleString() + " ₽";
    document.getElementById('inc-coeff').textContent = (income.avgCoeff || 0).toFixed(2);

    // 2. Строим таблицу заказов
    const tbody = document.getElementById('orders-table-body');
    tbody.innerHTML = ""; // очищаем

    if(income.orders && income.orders.length > 0) {
      income.orders.forEach(order => {
        const tr = document.createElement('tr');
        
        // Проверка флага "Изготовлен" для красивого бейджа
        const mfgBadge = order.isManufactured 
          ? `<span class="status-badge status-true">Да</span>` 
          : `<span class="status-badge status-false">Нет</span>`;

        tr.innerHTML = `
          <td>${order.date}</td>
          <td><strong>${order.orderId}</strong></td>
          <td>${Math.round(order.revPlan).toLocaleString()} ₽</td>
          <td>${Math.round(order.debt).toLocaleString()} ₽</td>
          <td>${mfgBadge}</td>
          <td>${Math.round(order.baseIncome).toLocaleString()} ₽</td>
          <td>${order.coeff}</td>
          <td>${Math.round(order.overprice).toLocaleString()} ₽</td>
          <td><span style="font-weight:600; color:#2e7d32;">${Math.round(order.totalIncome).toLocaleString()} ₽</span></td>
          <td>${order.paymentStatus}</td>
        `;
        tbody.appendChild(tr);
      });
    } else {
      tbody.innerHTML = `<tr><td colspan="10" style="text-align:center;">Заказов для данного менеджера не найдено</td></tr>`;
    }

    // 3. Строим график истории доходов по месяцам (Chart.js)
    if(income.history && income.history.labels && income.history.labels.length > 0) {
      const ctx = document.getElementById('incomeChart').getContext('2d');
      
      // Если график уже создавался ранее, уничтожаем его, чтобы избежать наложений
      if (incomeChartInstance) {
        incomeChartInstance.destroy();
      }

      incomeChartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: income.history.labels,
          datasets: [{
            label: 'Доход по месяцам (₽)',
            data: income.history.values,
            backgroundColor: 'rgba(0, 123, 255, 0.6)',
            borderColor: 'rgba(0, 123, 255, 1)',
            borderWidth: 1
          }]
        },
        options: {
          responsive: true,
          scales: {
            y: { beginAtZero: true }
          }
        }
      });
    }
  }
</script>

</body>
</html>
